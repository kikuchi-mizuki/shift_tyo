<!DOCTYPE html>
<html>
<head>
  <title>Clear Cache</title>
</head>
<body>
  <h1>キャッシュクリア</h1>
  <button onclick="clearAll()">すべてクリア</button>
  <pre id="result"></pre>
  
  <script>
    function clearAll() {
      // LocalStorageをクリア
      localStorage.clear();
      sessionStorage.clear();
      
      document.getElementById('result').textContent = 
        'LocalStorageとSessionStorageをクリアしました。\n\nhttp://localhost:5173 に戻って再度ログインしてください。';
    }
  </script>
</body>
</html>
