<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>緊急シフト依頼テスト</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 15px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .debug { background: #f8f9fa; color: #495057; border: 1px solid #dee2e6; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <div class="container">
        <h1>緊急シフト依頼テスト</h1>
        
        <form id="emergencyForm">
            <div class="form-group">
                <label for="date">日付:</label>
                <input type="date" id="date" required>
            </div>
            
            <div class="form-group">
                <label for="pharmacyId">薬局ID:</label>
                <input type="text" id="pharmacyId" value="test-pharmacy" required>
            </div>
            
            <div class="form-group">
                <label for="storeName">店舗名:</label>
                <input type="text" id="storeName" value="テスト (本店)" required>
            </div>
            
            <div class="form-group">
                <label for="targetType">送信先:</label>
                <select id="targetType" required>
                    <option value="all">全ての薬剤師</option>
                </select>
            </div>
            
            <button type="submit">緊急シフト依頼を送信</button>
        </form>
        
        <div id="result"></div>
        
        <div id="debug"></div>
    </div>

    <script>
        // 今日の日付を設定
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        
        document.getElementById('emergencyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            const debugDiv = document.getElementById('debug');
            
            const formData = {
                date: document.getElementById('date').value,
                timeSlot: 'fullday',
                startTime: '',
                endTime: '',
                pharmacyId: document.getElementById('pharmacyId').value,
                storeName: document.getElementById('storeName').value,
                targetType: document.getElementById('targetType').value,
                targetUserIds: [],
                maxTravelMinutes: 30
            };
            
            try {
                resultDiv.innerHTML = '<div class="debug">送信中...</div>';
                debugDiv.innerHTML = '<pre>リクエストデータ:\n' + JSON.stringify(formData, null, 2) + '</pre>';
                
                const response = await fetch('https://wjgterfwurmvosawzbjs.supabase.co/functions/v1/send-emergency-shift', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqZ3RlcmZ3dXJtdm9zYXd6YmpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQ5NzQ4MDAsImV4cCI6MjA1MDU1MDgwMH0.bDs2CtZ9dJ0eN0vRUPA7CtR6VqYeYW1m747_IUYJxGE'
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                debugDiv.innerHTML += '<pre>レスポンスデータ:\n' + JSON.stringify(data, null, 2) + '</pre>';
                
                if (response.ok && data.success) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>送信完了！</h3>
                            <p>対象: ${data.total || 0}名</p>
                            <p>送信成功: ${data.sent || 0}件</p>
                            <p>スキップ: ${data.skipped || 0}件</p>
                            <p>失敗: ${data.failed || 0}件</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h3>送信失敗</h3>
                            <p>エラー: ${data.error || '不明なエラー'}</p>
                        </div>
                    `;
                }
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>エラーが発生しました</h3>
                        <p>${error.message}</p>
                    </div>
                `;
                debugDiv.innerHTML += '<pre>エラー:\n' + error.stack + '</pre>';
            }
        });
    </script>
</body>
</html>
